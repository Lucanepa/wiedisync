<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <meta name="supported-color-schemes" content="dark light">
  <meta name="description" content="KSC Wiedikon — Basketball und Volleyball seit 1982. Sportverein in Zürich-Wiedikon mit über 30 Teams.">
  <title>KSC Wiedikon — Basketball &amp; Volleyball</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="/images/kscw_trio.png" type="image/png">
  <meta name="i18n-title" content="homeTitle">
  <!-- i18n: early language detection + FOUC prevention -->
  <script>
    (function() {
      var lang = localStorage.getItem('lang');
      if (!lang && navigator.language && navigator.language.startsWith('en')) lang = 'en';
      if (lang && lang !== 'de') {
        document.documentElement.lang = lang;
        var style = document.createElement('style');
        style.textContent = '.i18n-loading [data-i18n],.i18n-loading [data-i18n-placeholder]{visibility:hidden}';
        document.head.appendChild(style);
        document.addEventListener('DOMContentLoaded', function() { document.body.classList.add('i18n-loading'); });
      }
    })();
  </script>
  <script src="/js/i18n.js"></script>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════════
       HEADER
       ═══════════════════════════════════════════════════════════ -->
  <div id="site-header"></div>

  <main>

    <!-- ═══════════════════════════════════════════════════════════
         HERO
         ═══════════════════════════════════════════════════════════ -->
    <section class="hero">
      <div class="container">
        <div class="hero-content">
          <img src="/images/kscw_trio.png" alt="" class="hero-logo" aria-hidden="true">
          <h1>KSC Wiedikon</h1>
          <p class="hero-subtitle" data-i18n="homeSubtitle">Basketball und Volleyball seit 1982</p>
          <div class="hero-buttons">
            <a href="/volleyball/index.html" class="btn sport-btn sport-btn--vb">Volleyball</a>
            <a href="/basketball/index.html" class="btn sport-btn sport-btn--bb">Basketball</a>
          </div>
        </div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════════════
         NEWS / AKTUELLES
         ═══════════════════════════════════════════════════════════ -->
    <section class="section" id="news">
      <div class="container">
        <div class="section-header">
          <div>
            <h2 data-i18n="homeNews">Aktuelles</h2>
            <div class="gold-bar"></div>
          </div>
        </div>
        <div id="news-grid" class="grid grid-3">
          <!-- Populated by JavaScript -->
        </div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════════════
         NÄCHSTE SPIELE
         ═══════════════════════════════════════════════════════════ -->
    <section class="section-alt" id="upcoming-games">
      <div class="container">
        <div class="section-header">
          <div>
            <h2 data-i18n="homeUpcomingGames">Nächste Spiele</h2>
            <div class="gold-bar"></div>
          </div>
        </div>
        <div id="upcoming-games-list">
          <!-- Populated by JavaScript -->
        </div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════════════
         LETZTE RESULTATE
         ═══════════════════════════════════════════════════════════ -->
    <section class="section" id="recent-results">
      <div class="container">
        <div class="section-header">
          <div>
            <h2 data-i18n="homeRecentResults">Letzte Resultate</h2>
            <div class="gold-bar"></div>
          </div>
        </div>
        <div id="recent-results-list">
          <!-- Populated by JavaScript -->
        </div>
      </div>
    </section>

    <!-- ═══════════════════════════════════════════════════════════
         SPONSOR STRIP
         ═══════════════════════════════════════════════════════════ -->
    <section class="section-alt" id="sponsors">
      <div class="container">
        <div class="section-header">
          <div>
            <h2 data-i18n="homePartners">Unsere Partner</h2>
            <div class="gold-bar"></div>
          </div>
          <a href="/sponsoren/index.html" class="btn btn-sm btn-outline" data-i18n="homeAllSponsors">Alle Sponsoren &rarr;</a>
        </div>
        <div class="sponsor-overflow">
          <div id="sponsor-track" class="sponsor-track">
            <!-- Populated by JavaScript -->
          </div>
        </div>
      </div>
    </section>

  </main>

  <!-- ═══════════════════════════════════════════════════════════
       FOOTER
       ═══════════════════════════════════════════════════════════ -->
  <div id="site-footer"></div>

  <!-- ═══════════════════════════════════════════════════════════
       SCRIPTS
       ═══════════════════════════════════════════════════════════ -->
  <script src="/js/data.js"></script>
  <script src="/js/main.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>

  <script>
    (function () {
      'use strict';

      var D = window.KSCW;
      if (!D) return;

      // ── Helper: safely set text content on an element ──────
      function setText(el, text) {
        el.textContent = text;
      }

      // ── Helper: create a team chip element ─────────────────
      function createChip(teamShort) {
        var t = D.getTeam(teamShort);
        var chip = document.createElement('span');
        chip.className = 'chip';
        if (t) {
          chip.style.background = t.bg;
          chip.style.color = t.text;
          chip.style.border = '1px solid ' + t.border;
          chip.textContent = t.short;
        } else {
          chip.style.background = '#e2e8f0';
          chip.style.color = '#475569';
          chip.textContent = teamShort;
        }
        return chip;
      }

      // ── Helper: create home/away badge ─────────────────────
      function createBadge(isHome) {
        var badge = document.createElement('span');
        badge.className = 'game-badge ' + (isHome ? 'home' : 'away');
        badge.textContent = isHome ? 'Heim' : 'Auswärts';
        return badge;
      }

      // ── Helper: build a game-teams span ────────────────────
      function createTeamsSpan(game) {
        var span = document.createElement('span');
        span.className = 'game-teams';
        if (game.isHome) {
          span.appendChild(document.createTextNode('KSCW ' + game.teamShort + ' '));
          var vs1 = document.createElement('span');
          vs1.className = 'vs';
          vs1.textContent = 'vs';
          span.appendChild(vs1);
          span.appendChild(document.createTextNode(' ' + game.opponent));
        } else {
          span.appendChild(document.createTextNode(game.opponent + ' '));
          var vs2 = document.createElement('span');
          vs2.className = 'vs';
          vs2.textContent = 'vs';
          span.appendChild(vs2);
          span.appendChild(document.createTextNode(' KSCW ' + game.teamShort));
        }
        return span;
      }

      // ── Helper: create a game row element ──────────────────
      function createGameRow(game, showScore) {
        var row = document.createElement('div');
        row.className = 'game-row fade-in';

        var dateEl = document.createElement('span');
        dateEl.className = 'game-date';
        dateEl.textContent = D.formatDate(game.date);
        row.appendChild(dateEl);

        row.appendChild(createChip(game.teamShort));
        row.appendChild(createBadge(game.isHome));
        row.appendChild(createTeamsSpan(game));

        if (showScore && game.score) {
          var scoreEl = document.createElement('span');
          var win = D.isWin(game);
          scoreEl.className = 'game-score';
          if (win === true) scoreEl.className += ' win';
          else if (win === false) scoreEl.className += ' loss';
          scoreEl.textContent = game.score;
          row.appendChild(scoreEl);
        } else {
          var timeEl = document.createElement('span');
          timeEl.className = 'game-date';
          timeEl.textContent = game.time;
          row.appendChild(timeEl);
        }

        return row;
      }

      // ── 1. News Cards ──────────────────────────────────────
      var newsGrid = document.getElementById('news-grid');
      if (newsGrid && D.news) {
        var articles = D.news.slice(0, 6);
        var fragment = document.createDocumentFragment();
        for (var i = 0; i < articles.length; i++) {
          var n = articles[i];

          var article = document.createElement('article');
          article.className = 'card news-card fade-in';

          // Placeholder image
          var imgPlaceholder = document.createElement('div');
          imgPlaceholder.className = 'card-img-placeholder';
          var iconSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          iconSvg.setAttribute('viewBox', '0 0 24 24');
          iconSvg.setAttribute('fill', 'none');
          iconSvg.setAttribute('stroke', 'currentColor');
          iconSvg.setAttribute('stroke-width', '1.5');
          iconSvg.setAttribute('stroke-linecap', 'round');
          iconSvg.setAttribute('stroke-linejoin', 'round');
          iconSvg.style.width = '48px';
          iconSvg.style.height = '48px';
          iconSvg.style.opacity = '0.3';
          var path1 = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path1.setAttribute('d', 'M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-2 2Zm0 0a2 2 0 0 1-2-2v-9c0-1.1.9-2 2-2h2');
          iconSvg.appendChild(path1);
          var line1 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line1.setAttribute('x1', '18'); line1.setAttribute('y1', '2');
          line1.setAttribute('x2', '18'); line1.setAttribute('y2', '22');
          iconSvg.appendChild(line1);
          var line2 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line2.setAttribute('x1', '10'); line2.setAttribute('y1', '6');
          line2.setAttribute('x2', '14'); line2.setAttribute('y2', '6');
          iconSvg.appendChild(line2);
          var line3 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line3.setAttribute('x1', '10'); line3.setAttribute('y1', '10');
          line3.setAttribute('x2', '14'); line3.setAttribute('y2', '10');
          iconSvg.appendChild(line3);
          var line4 = document.createElementNS('http://www.w3.org/2000/svg', 'line');
          line4.setAttribute('x1', '10'); line4.setAttribute('y1', '14');
          line4.setAttribute('x2', '14'); line4.setAttribute('y2', '14');
          iconSvg.appendChild(line4);
          imgPlaceholder.appendChild(iconSvg);
          article.appendChild(imgPlaceholder);

          // Card body
          var body = document.createElement('div');
          body.className = 'card-body';

          // Date + category row
          var meta = document.createElement('div');
          meta.className = 'flex items-center gap-sm mb-md';
          var dateSpan = document.createElement('span');
          dateSpan.className = 'news-date';
          dateSpan.textContent = D.formatDate(n.date);
          meta.appendChild(dateSpan);

          var catBadge = document.createElement('span');
          catBadge.className = 'badge';
          if (n.category === 'volleyball') {
            catBadge.className += ' badge-blue';
            catBadge.textContent = 'Volleyball';
          } else if (n.category === 'basketball') {
            catBadge.className += ' badge-gold';
            catBadge.textContent = 'Basketball';
          } else {
            catBadge.textContent = 'Club';
          }
          meta.appendChild(catBadge);
          body.appendChild(meta);

          var title = document.createElement('h3');
          title.textContent = n.title;
          body.appendChild(title);

          var excerpt = document.createElement('p');
          excerpt.className = 'news-excerpt';
          excerpt.textContent = n.excerpt;
          body.appendChild(excerpt);

          article.appendChild(body);
          fragment.appendChild(article);
        }
        newsGrid.appendChild(fragment);
      }

      // ── 2. Upcoming Games ──────────────────────────────────
      var upcomingList = document.getElementById('upcoming-games-list');
      if (upcomingList) {
        var upcoming = D.getUpcomingGames().slice(0, 5);
        var upFrag = document.createDocumentFragment();
        for (var u = 0; u < upcoming.length; u++) {
          upFrag.appendChild(createGameRow(upcoming[u], false));
        }
        upcomingList.appendChild(upFrag);
      }

      // ── 3. Recent Results ──────────────────────────────────
      var resultsList = document.getElementById('recent-results-list');
      if (resultsList) {
        var completed = D.getCompletedGames().slice(0, 5);
        var resFrag = document.createDocumentFragment();
        for (var r = 0; r < completed.length; r++) {
          resFrag.appendChild(createGameRow(completed[r], true));
        }
        resultsList.appendChild(resFrag);
      }

      // ── 4. Sponsor Carousel ────────────────────────────────
      var sponsorTrack = document.getElementById('sponsor-track');
      if (sponsorTrack && D.sponsors) {
        var allSponsors = [].concat(D.sponsors.gold, D.sponsors.silver, D.sponsors.bronze);
        var spFrag = document.createDocumentFragment();
        // Render sponsors twice for infinite scroll effect
        for (var pass = 0; pass < 2; pass++) {
          for (var s = 0; s < allSponsors.length; s++) {
            var sp = allSponsors[s];
            var link = document.createElement('a');
            link.href = sp.url;
            link.className = 'sponsor-item';
            link.target = '_blank';
            link.rel = 'noopener noreferrer';
            link.title = sp.name;
            var label = document.createElement('span');
            label.textContent = sp.name;
            link.appendChild(label);
            spFrag.appendChild(link);
          }
        }
        sponsorTrack.appendChild(spFrag);
      }

      // ── 5. Trigger fade-in animations ──────────────────────
      var fadeEls = document.querySelectorAll('.fade-in');
      if ('IntersectionObserver' in window) {
        var observer = new IntersectionObserver(function (entries) {
          for (var j = 0; j < entries.length; j++) {
            if (entries[j].isIntersecting) {
              entries[j].target.classList.add('visible');
              observer.unobserve(entries[j].target);
            }
          }
        }, { threshold: 0.1 });
        for (var f = 0; f < fadeEls.length; f++) {
          observer.observe(fadeEls[f]);
        }
      } else {
        for (var ff = 0; ff < fadeEls.length; ff++) {
          fadeEls[ff].classList.add('visible');
        }
      }

    })();
  </script>

</body>
</html>
