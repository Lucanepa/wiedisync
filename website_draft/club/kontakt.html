<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <meta name="supported-color-schemes" content="dark light">
  <title>Kontakt — KSC Wiedikon</title>
  <meta name="description" content="Kontaktiere den KSC Wiedikon — Volleyball und Basketball in Zürich-Wiedikon.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <!-- i18n: early language detection + FOUC prevention -->
  <script>
    (function() {
      var lang = localStorage.getItem('lang');
      if (!lang && navigator.language && navigator.language.startsWith('en')) lang = 'en';
      if (lang && lang !== 'de') {
        document.documentElement.lang = lang;
        var style = document.createElement('style');
        style.textContent = '.i18n-loading [data-i18n],.i18n-loading [data-i18n-placeholder]{visibility:hidden}';
        document.head.appendChild(style);
        document.addEventListener('DOMContentLoaded', function() { document.body.classList.add('i18n-loading'); });
      }
    })();
  </script>
  <script src="/js/i18n.js"></script>
  <style>
    .contact-layout {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: var(--space-2xl);
      align-items: start;
    }
    @media (max-width: 768px) {
      .contact-layout { grid-template-columns: 1fr; }
    }
    .contact-form {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
    }
    .contact-form h2 {
      font-size: var(--text-xl);
      font-weight: 700;
      margin-bottom: var(--space-lg);
      color: var(--text-primary);
    }
    .form-group {
      margin-bottom: var(--space-md);
    }
    .form-group label {
      display: block;
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: var(--space-xs);
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.625rem 0.875rem;
      font-size: var(--text-sm);
      font-family: 'Inter', sans-serif;
      border: 1px solid var(--border);
      border-radius: var(--radius-md, 8px);
      background: var(--bg-white);
      color: var(--text-primary);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      box-sizing: border-box;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--kscw-blue, #4A55A2);
      box-shadow: 0 0 0 3px rgba(74, 85, 162, 0.15);
    }
    .form-group textarea {
      min-height: 140px;
      resize: vertical;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
    }
    @media (max-width: 480px) {
      .form-row { grid-template-columns: 1fr; }
    }
    .form-submit {
      display: inline-flex;
      align-items: center;
      gap: var(--space-xs);
      padding: 0.75rem 1.5rem;
      font-size: var(--text-sm);
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      background: var(--kscw-blue, #4A55A2);
      border: none;
      border-radius: var(--radius-md, 8px);
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }
    .form-submit:hover {
      background: #3b4590;
    }
    .form-submit:active {
      transform: scale(0.98);
    }
    .contact-sidebar h2 {
      font-size: var(--text-xl);
      font-weight: 700;
      margin-bottom: var(--space-lg);
    }
    .contact-info-card {
      background: var(--bg-white);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
      margin-bottom: var(--space-lg);
    }
    .contact-info-card h3 {
      font-size: var(--text-base);
      font-weight: 700;
      margin-bottom: var(--space-sm);
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      color: var(--text-primary);
    }
    .contact-info-card p {
      font-size: var(--text-sm);
      color: var(--text-secondary);
      line-height: 1.8;
      margin: 0;
    }
    .contact-info-card a {
      color: var(--kscw-blue, #4A55A2);
      text-decoration: underline;
    }
    .social-links {
      display: flex;
      gap: var(--space-md);
      margin-top: var(--space-md);
    }
    .social-link {
      display: flex;
      align-items: center;
      gap: var(--space-xs);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    .social-link:hover {
      color: var(--kscw-blue, #4A55A2);
    }
    /* Team dropdown slide-in */
    #team-group {
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
    }
    #team-group[style*="display: none"] {
      max-height: 0;
      opacity: 0;
    }
    /* Feedback messages */
    .form-feedback {
      padding: 0.875rem 1rem;
      border-radius: var(--radius-md, 8px);
      font-size: var(--text-sm);
      font-weight: 500;
      margin-top: var(--space-md);
    }
    .form-feedback--success {
      background: rgba(34, 197, 94, 0.1);
      color: #16a34a;
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
    .form-feedback--error {
      background: rgba(239, 68, 68, 0.1);
      color: #dc2626;
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    @media (prefers-color-scheme: dark) {
      .form-feedback--success { color: #4ade80; }
      .form-feedback--error { color: #f87171; }
    }
    .form-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    #turnstile-container {
      min-height: 65px;
    }
  </style>
</head>
<body>

  <!-- ═══ Header ═══════════════════════════════════════════════════ -->
  <div id="site-header"></div>

  <!-- ═══ Page Header ══════════════════════════════════════════════ -->
  <section class="page-header">
    <div class="container">
      <h1 data-i18n="contactTitle">Kontakt</h1>
      <p style="font-size: var(--text-lg); margin-top: var(--space-sm); opacity: 0.85;" data-i18n="contactSubtitle">Wir freuen uns auf deine Nachricht</p>
    </div>
  </section>

  <!-- ═══ Contact Content ══════════════════════════════════════════ -->
  <section class="section">
    <div class="container">
      <div class="contact-layout">

        <!-- Contact Form -->
        <div class="contact-form">
          <h2 data-i18n="contactFormHeading">Nachricht senden</h2>
          <form id="contact-form" action="#" method="post">
            <div class="form-row">
              <div class="form-group">
                <label for="vorname" data-i18n="contactFirstName">Vorname</label>
                <input type="text" id="vorname" name="vorname" placeholder="Dein Vorname" data-i18n-placeholder="contactFirstNamePlaceholder" required>
              </div>
              <div class="form-group">
                <label for="nachname" data-i18n="contactLastName">Nachname</label>
                <input type="text" id="nachname" name="nachname" placeholder="Dein Nachname" data-i18n-placeholder="contactLastNamePlaceholder" required>
              </div>
            </div>
            <div class="form-group">
              <label for="email" data-i18n="contactEmail">E-Mail</label>
              <input type="email" id="email" name="email" placeholder="deine@email.ch" data-i18n-placeholder="contactEmailPlaceholder" required>
            </div>
            <div class="form-group">
              <label for="betreff" data-i18n="contactSubject">Betreff</label>
              <select id="betreff" name="betreff" required>
                <option value="" disabled selected data-i18n="contactSubjectPlaceholder">Bitte wählen...</option>
                <option value="allgemein" data-i18n="contactSubjectGeneral">Allgemein</option>
                <option value="volleyball" data-i18n="contactSubjectVolleyball">Volleyball</option>
                <option value="basketball" data-i18n="contactSubjectBasketball">Basketball</option>
                <option value="sponsoring" data-i18n="contactSubjectSponsoring">Sponsoring</option>
                <option value="sonstiges" data-i18n="contactSubjectOther">Sonstiges</option>
              </select>
            </div>
            <div class="form-group" id="team-group" style="display: none;">
              <label for="team-select" data-i18n="contactTeam">Team</label>
              <select id="team-select" name="team">
                <option value="" disabled selected data-i18n="contactTeamPlaceholder">Bitte wählen...</option>
              </select>
            </div>
            <div class="form-group">
              <label for="nachricht" data-i18n="contactMessage">Nachricht</label>
              <textarea id="nachricht" name="nachricht" placeholder="Deine Nachricht..." data-i18n-placeholder="contactMessagePlaceholder" required></textarea>
            </div>
            <div id="turnstile-container" class="form-group"></div>
            <button type="submit" class="form-submit">
              <i data-lucide="send" style="width: 16px; height: 16px;"></i>
              <span data-i18n="contactSubmit">Absenden</span>
            </button>
          </form>
          <div id="form-feedback" style="display: none;"></div>
        </div>

        <!-- Sidebar -->
        <div class="contact-sidebar">
          <h2 data-i18n="contactSidebar">Kontaktdaten</h2>

          <div class="contact-info-card">
            <h3>
              <i data-lucide="mail" style="width: 18px; height: 18px; color: var(--kscw-blue, #4A55A2);"></i>
              <span data-i18n="contactGeneral">Allgemein</span>
            </h3>
            <p>
              KSC Wiedikon<br>
              <a href="mailto:kontakt@kscw.ch">kontakt@kscw.ch</a>
            </p>
          </div>

          <div class="contact-info-card">
            <h3>
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--kscw-blue, #4A55A2)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20"/><path d="M2 12c3-3 6.5-5 10-5s7 2 10 5"/><path d="M2 12c3 3 6.5 5 10 5s7-2 10-5"/></svg>
              Volleyball
            </h3>
            <p>
              Thamayanth Kanagalingam<br>
              <a href="mailto:volleyball@kscw.ch">volleyball@kscw.ch</a>
            </p>
          </div>

          <div class="contact-info-card">
            <h3>
              <i data-lucide="dribbble" style="width: 18px; height: 18px; color: #ea580c;"></i>
              Basketball
            </h3>
            <p>
              Anja Jimenez<br>
              <a href="mailto:anja.jimenez@kscw.ch">anja.jimenez@kscw.ch</a>
            </p>
            <p style="margin-top: var(--space-sm);">
              Rachel Moser<br>
              <a href="mailto:rachel.moser@kscw.ch">rachel.moser@kscw.ch</a>
            </p>
          </div>

          <div class="contact-info-card">
            <h3>
              <i data-lucide="share-2" style="width: 18px; height: 18px; color: var(--kscw-blue, #4A55A2);"></i>
              <span data-i18n="contactSocialMedia">Social Media</span>
            </h3>
            <div class="social-links">
              <a href="https://www.facebook.com/kscwiedikon/" class="social-link">
                <i data-lucide="facebook" style="width: 18px; height: 18px;"></i>
                KSC-Wiedikon
              </a>
              <a href="https://www.instagram.com/ksc_wiedikon/" class="social-link">
                <i data-lucide="instagram" style="width: 18px; height: 18px;"></i>
                @ksc_wiedikon
              </a>
            </div>
          </div>

        </div>

      </div>
    </div>
  </section>

  <!-- ═══ Footer ═══════════════════════════════════════════════════ -->
  <div id="site-footer"></div>

  <!-- ═══ Scripts ══════════════════════════════════════════════════ -->
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
  <script src="/js/data.js"></script>
  <script src="/js/main.js"></script>
  <script src="/js/contact-form.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>

</body>
</html>
