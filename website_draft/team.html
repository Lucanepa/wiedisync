<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="dark light">
  <meta name="supported-color-schemes" content="dark light">
  <title>Team — KSC Wiedikon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="/images/kscw_trio.png" type="image/png">
  <!-- i18n: early language detection + FOUC prevention -->
  <script>
    (function() {
      var lang = localStorage.getItem('lang');
      if (!lang && navigator.language && navigator.language.startsWith('en')) lang = 'en';
      if (lang && lang !== 'de') {
        document.documentElement.lang = lang;
        var style = document.createElement('style');
        style.textContent = '.i18n-loading [data-i18n],.i18n-loading [data-i18n-placeholder]{visibility:hidden}';
        document.head.appendChild(style);
        document.addEventListener('DOMContentLoaded', function() { document.body.classList.add('i18n-loading'); });
      }
    })();
  </script>
  <script src="/js/i18n.js"></script>
</head>
<body>
  <div id="site-header"></div>

  <main>
    <!-- Hero: rendered by JS -->
    <section id="team-hero-container"></section>

    <!-- Team photo: rendered by JS -->
    <div id="team-photo-container"></div>

    <!-- Content tabs -->
    <section class="section">
      <div class="container">
        <div class="tab-bar" role="tablist">
          <button class="tab-btn active" data-tab="kader" role="tab" aria-selected="true" data-i18n="teamTabRoster">Kader</button>
          <button class="tab-btn" data-tab="spiele" role="tab" aria-selected="false" data-i18n="teamTabGames">Spiele</button>
          <button class="tab-btn" data-tab="rangliste" role="tab" aria-selected="false" data-i18n="teamTabRankings">Rangliste</button>
          <button class="tab-btn" data-tab="training" role="tab" aria-selected="false" data-i18n="teamTabTraining">Training</button>
        </div>

        <div class="tab-panel active" data-tab-panel="kader" role="tabpanel">
          <div id="roster-grid" class="roster-grid">
            <p class="text-muted text-sm" data-i18n="teamLoadingRoster">Kader wird geladen...</p>
          </div>
          <div id="roster-meta" class="mt-lg"></div>
        </div>

        <div class="tab-panel" data-tab-panel="spiele" role="tabpanel">
          <h2 style="font-size: var(--text-2xl); margin-bottom: var(--space-lg);" data-i18n="teamUpcoming">Nächste Spiele</h2>
          <div id="upcoming-games">
            <p class="text-muted text-sm" data-i18n="teamLoadingGames">Spiele werden geladen...</p>
          </div>
          <h2 style="font-size: var(--text-2xl); margin-top: var(--space-2xl); margin-bottom: var(--space-lg);" data-i18n="teamResults">Letzte Resultate</h2>
          <div id="recent-results">
            <p class="text-muted text-sm" data-i18n="teamLoadingResults">Resultate werden geladen...</p>
          </div>
        </div>

        <div class="tab-panel" data-tab-panel="rangliste" role="tabpanel">
          <div id="rankings-table">
            <p class="text-muted text-sm" data-i18n="teamLoadingRankings">Rangliste wird geladen...</p>
          </div>
        </div>

        <div class="tab-panel" data-tab-panel="training" role="tabpanel">
          <div id="training-list">
            <p class="text-muted text-sm" data-i18n="teamLoadingTrainings">Trainingszeiten werden geladen...</p>
          </div>
        </div>
      </div>
    </section>

    <!-- Instagram embed: rendered by JS when team has social_url -->
    <section id="instagram-embed-container" class="section" style="display:none;">
      <div class="container">
        <h2 id="instagram-heading" style="font-size: var(--text-2xl); margin-bottom: var(--space-lg);">Instagram</h2>
        <div id="instagram-embed" class="instagram-embed-wrapper"></div>
      </div>
    </section>

    <!-- CTA: rendered by JS -->
    <div id="cta-container"></div>
  </main>

  <!-- Footer -->
  <div id="site-footer"></div>

  <script>
    // Resolve team PB ID from URL path (e.g. /volleyball/h1 → pbId)
    (function() {
      var PATH_TO_ID = {
        '/volleyball/d1': 'p1i9cs4km520dd6',
        '/volleyball/d2': '9kwn129z84967fc',
        '/volleyball/d3': 'c18yey33vwx9yo4',
        '/volleyball/d4': '2h55x265r941a4k',
        '/volleyball/h1': 'qz7y8l4tz48f65j',
        '/volleyball/h2': '601p27iw4xvw1ds',
        '/volleyball/h3': 'il1wd1p018hrb61',
        '/volleyball/legends': 'e352q254s1cip8y',
        '/volleyball/du23': 'vo89vn93wdoo01o',
        '/volleyball/hu23': '6380e7aj8z80o79',
        '/volleyball/hu20': '274nyi35of7v34x',
        '/basketball/h1': 'wpg9887276cdkd9',
        '/basketball/h3': 'oqqn58l012ie36e',
        '/basketball/h4': '4e65vlw744mldc0',
        '/basketball/lions': '31k9c1qk62p23oe',
        '/basketball/rhinos': 'cj55682587v210q',
      };

      var path = window.location.pathname.replace(/\/+$/, '');
      var id = PATH_TO_ID[path] || new URLSearchParams(window.location.search).get('id');

      if (!id) {
        var main = document.querySelector('main');
        while (main.firstChild) main.removeChild(main.firstChild);
        var wrapper = document.createElement('div');
        wrapper.className = 'container';
        wrapper.style.cssText = 'padding:4rem 0;text-align:center;';
        var h = document.createElement('h1');
        h.textContent = (window.i18n ? i18n.t('teamNotFound') : 'Team nicht gefunden');
        var p = document.createElement('p');
        p.className = 'text-muted mt-md';
        p.textContent = (window.i18n ? i18n.t('teamNoTeam') : 'Kein Team angegeben.');
        var a = document.createElement('a');
        a.href = '/';
        a.className = 'btn btn-primary mt-lg';
        a.textContent = (window.i18n ? i18n.t('teamBackHome') : 'Zurück zur Startseite');
        a.style.display = 'inline-block';
        wrapper.appendChild(h);
        wrapper.appendChild(p);
        wrapper.appendChild(a);
        main.appendChild(wrapper);
        return;
      }
      window.TEAM_CONFIG = { short: '', pbId: id };
    })();
  </script>
  <script src="/js/data.js"></script>
  <script src="/js/team-page.js"></script>
  <script src="/js/main.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
